<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Operations Room — Rubin OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  /* dark-first instrument panel — Arbor-DNA bones, sins retired */
  --bg:oklch(0.18 0.010 152);
  --bg-2:oklch(0.165 0.010 155);
  --surface:oklch(0.225 0.012 152);
  --surface-2:oklch(0.265 0.014 152);
  --line:oklch(0.33 0.015 152);
  --line-soft:oklch(0.295 0.013 152);
  --ink:oklch(0.96 0.010 95);
  --ink-2:oklch(0.79 0.016 110);
  --ink-3:oklch(0.655 0.018 120);
  --accent:oklch(0.74 0.13 158);
  --accent-dim:oklch(0.74 0.13 158 / .14);

  /* per-company hue = a data dimension (badge fill + dot only) */
  --ar:oklch(0.74 0.13 158);
  --hv:oklch(0.76 0.13 70);
  --ea:oklch(0.72 0.10 235);
  --gr:oklch(0.72 0.12 300);

  /* status semantics — fixed, never reused for branding */
  --green:oklch(0.80 0.15 158);
  --amber:oklch(0.84 0.135 82);
  --red:oklch(0.71 0.17 24);
  --held:oklch(0.72 0.12 300);

  --mono:"SF Mono",ui-monospace,"JetBrains Mono",Consolas,monospace;
  --sans:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif;
  --serif:"Frank Ruhl Libre",Georgia,"Times New Roman",serif;

  --t-h1:1.875rem; --t-h2:1.0625rem; --t-lg:0.9375rem; --t-base:0.84375rem;
  --t-sm:0.75rem; --t-mono:0.6875rem; --t-micro:0.59375rem;

  --r:12px; --r-sm:8px;
  --ease:cubic-bezier(.2,.7,.3,1);
  --barH:52px;
  --z-sticky:10; --z-scrim:30; --z-drawer:40; --z-cmd:50; --z-toast:60;
}
*{box-sizing:border-box;min-width:0}
html,body{height:100%}
body{
  margin:0;color:var(--ink);font-family:var(--sans);font-size:var(--t-base);line-height:1.5;
  -webkit-font-smoothing:antialiased;letter-spacing:-0.005em;
  background:var(--bg);
}
::selection{background:var(--accent-dim);color:var(--ink)}
button{font:inherit;color:inherit;cursor:pointer;background:none;border:none}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:5px}
.mono{font-family:var(--mono);font-variant-ligatures:none;font-size:var(--t-mono)}
.micro{font-family:var(--mono);font-size:var(--t-micro);letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3)}

/* dots */
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:none}
.dot.green{background:var(--green)}
.dot.green.beat{box-shadow:0 0 0 3px oklch(0.80 0.15 158 / .16)}
.dot.amber{background:var(--amber)}
.dot.red{background:var(--red)}
.dot.held{background:var(--held)}
.dot.neutral{background:transparent;border:1px solid var(--ink-3)}
.dot.hollow{background:transparent;border:1px dashed var(--ink-3);opacity:.6}
@keyframes beat{0%,100%{opacity:1}50%{opacity:.45}}
.dot.beat{animation:beat 2.6s var(--ease) infinite}
@media (prefers-reduced-motion:reduce){
  *{animation:none!important;transition:none!important}
}

/* ── SYSTEM BAR ────────────────────────────────────────────────────── */
.sysbar{position:fixed;top:0;left:0;right:0;height:var(--barH);z-index:var(--z-sticky);
  display:flex;align-items:center;gap:18px;padding:0 18px;
  background:color-mix(in oklab,var(--bg-2) 92%,transparent);
  border-bottom:1px solid var(--line-soft);backdrop-filter:blur(8px)}
.sysbar .glyph{width:30px;height:30px;border-radius:8px;background:var(--surface);border:1px solid var(--line);
  display:grid;place-items:center;color:var(--accent);font-family:var(--serif);font-weight:700;font-size:17px;flex:none}
.sysbar .clock{font-family:var(--mono);font-size:var(--t-mono);color:var(--ink-2);white-space:nowrap}
.sysbar .clock b{color:var(--ink);font-weight:600}
.sysbar .runtimes{display:flex;gap:11px;align-items:center;padding-left:4px}
.sysbar .rt{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3)}
.sysbar .next{font-family:var(--mono);font-size:var(--t-mono);color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sysbar .next b{color:var(--ink-2)}
.sysbar .spacer{flex:1}
.sysbar .kbd{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3);border:1px solid var(--line);border-radius:5px;padding:3px 7px;white-space:nowrap}
.needs{display:inline-flex;align-items:center;gap:7px;font-family:var(--mono);font-size:var(--t-mono);
  color:var(--amber);border:1px solid oklch(0.84 0.135 82 / .4);background:oklch(0.84 0.135 82 / .08);
  border-radius:999px;padding:5px 11px;white-space:nowrap;transition:background .12s var(--ease)}
.needs:hover{background:oklch(0.84 0.135 82 / .16)}
.needs.zero{color:var(--ink-3);border-color:var(--line);background:none}

/* ── SHELL ─────────────────────────────────────────────────────────── */
.app{display:grid;grid-template-columns:220px 1fr;padding-top:var(--barH);min-height:100vh}
.rail{position:sticky;top:var(--barH);height:calc(100vh - var(--barH));overflow:auto;
  border-right:1px solid var(--line-soft);padding:18px 14px;display:flex;flex-direction:column;gap:18px}
.rail .scopes{display:flex;flex-direction:column;gap:8px}
.seg{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:2px}
.seg button{padding:7px 4px;border-radius:6px;font-size:var(--t-sm);font-weight:600;color:var(--ink-2);
  display:flex;align-items:center;justify-content:center;gap:5px;transition:background .12s var(--ease),color .12s}
.seg button[aria-pressed="true"]{background:var(--surface-2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--accent)}
.seg button .sd{width:6px;height:6px;border-radius:50%}
nav{display:flex;flex-direction:column;gap:2px}
.nv{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--r-sm);color:var(--ink-2);
  font-size:var(--t-base);font-weight:500;width:100%;text-align:left;border:1px solid transparent;transition:background .12s var(--ease),color .12s}
.nv:hover{background:var(--surface)}
.nv[aria-current="true"]{background:var(--accent-dim);color:var(--ink);border-color:oklch(0.74 0.13 158 / .3)}
.nv .ic{width:15px;text-align:center;font-size:12px;color:var(--ink-3)}
.nv[aria-current="true"] .ic{color:var(--accent)}
.nv .ct{margin-left:auto;font-family:var(--mono);font-size:var(--t-mono);color:var(--ink-3)}
.rail .foot{margin-top:auto;line-height:1.8;border-top:1px solid var(--line-soft);padding-top:12px}
.rail .foot .pill{display:inline-flex;align-items:center;gap:5px;margin-top:4px}

/* ── MAIN ──────────────────────────────────────────────────────────── */
main{padding:0;max-width:1360px;width:100%}
.pipewrap{position:sticky;top:var(--barH);z-index:calc(var(--z-sticky) - 1);
  background:color-mix(in oklab,var(--bg) 94%,transparent);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--line-soft);padding:8px 26px}
.pipe{display:flex;align-items:stretch;gap:6px;overflow-x:auto;scrollbar-width:thin}
.pstage{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:999px;border:1px solid var(--line-soft);
  background:var(--surface);white-space:nowrap;transition:border-color .12s var(--ease),background .12s}
.pstage:hover{background:var(--surface-2)}
.pstage[aria-pressed="true"]{border-color:var(--accent);background:var(--accent-dim);color:var(--ink)}
.pstage .pl{font-size:var(--t-sm);font-weight:600}
.pstage .pn{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3)}
.pstage .arrow{color:var(--ink-3);font-family:var(--mono);font-size:var(--t-sm);align-self:center;flex:none}
.body{padding:24px 26px 90px}
.vhead{margin-bottom:22px}
.vhead h1{font-family:var(--serif);font-size:var(--t-h1);font-weight:700;line-height:1.05;margin:0;text-wrap:balance}
.vhead .sub{color:var(--ink-2);font-size:var(--t-sm);margin-top:6px;max-width:72ch}
.vhead .scopetag{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3);text-transform:uppercase;letter-spacing:.13em}

.view{display:none}
.view.on{display:block;animation:vin .22s var(--ease)}
@keyframes vin{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.lab{display:flex;align-items:center;gap:12px;margin:26px 0 13px;font-family:var(--mono);font-size:var(--t-mono);
  letter-spacing:.13em;text-transform:uppercase;color:var(--ink-3)}
.lab::after{content:"";flex:1;height:1px;background:var(--line-soft)}
.lab:first-child{margin-top:0}
.lab .cnt{font-family:var(--mono);color:var(--ink-2)}

/* freshness pill */
.fresh{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:var(--t-micro);
  border-radius:999px;padding:2px 8px;border:1px solid var(--line);color:var(--amber);background:oklch(0.84 0.135 82 / .08)}

/* ── OVERNIGHT LEDE ────────────────────────────────────────────────── */
.lede{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:18px 20px;margin-bottom:6px}
.lede .s{font-family:var(--serif);font-size:1.0625rem;line-height:1.4;color:var(--ink)}
.lede .deltas{display:flex;flex-wrap:wrap;gap:7px;margin-top:12px}
.delta{font-family:var(--mono);font-size:var(--t-mono);padding:3px 9px;border-radius:999px;border:1px solid var(--line);color:var(--ink-2);display:inline-flex;align-items:center;gap:6px}

/* ── PORTFOLIO TILES (the only cards) ──────────────────────────────── */
.tiles{display:grid;gap:13px;grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
.tile{position:relative;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);
  padding:16px 17px 14px;text-align:left;width:100%;transition:border-color .14s var(--ease),background .14s}
.tile:hover{border-color:var(--hue);background:var(--surface-2)}
.tile .top{display:flex;align-items:center;gap:11px}
.tile .badge{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;font-family:var(--serif);
  font-weight:700;font-size:16px;color:var(--bg);background:var(--hue);flex:none}
.tile .nm{font-family:var(--serif);font-weight:700;font-size:var(--t-h2);line-height:1.1}
.tile .rl{color:var(--ink-3);font-size:var(--t-sm);margin-top:1px}
.tile .rag{margin-left:auto;flex:none}
.tile .head{color:var(--ink-2);font-size:var(--t-sm);line-height:1.45;margin-top:11px;min-height:36px}
.tile .mx{display:flex;gap:16px;margin-top:12px;padding-top:11px;border-top:1px solid var(--line-soft)}
.tile .mx .v{font-family:var(--mono);font-size:1rem;font-weight:700;line-height:1;color:var(--ink)}
.tile .mx .k{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3);text-transform:uppercase;letter-spacing:.05em;margin-top:5px}

/* ── SPLIT (decisions | timeline) ──────────────────────────────────── */
.split{display:grid;gap:18px;grid-template-columns:1fr 1fr}
@media(max-width:1080px){.split{grid-template-columns:1fr}}

/* ── DECISION CARDS (flat, full border, no gradient) ───────────────── */
.deck{display:flex;flex-direction:column;gap:10px}
.deccard{background:var(--surface);border:1px solid oklch(0.84 0.135 82 / .35);border-radius:var(--r);
  padding:14px 15px;text-align:left;width:100%;transition:background .12s var(--ease)}
.deccard:hover{background:var(--surface-2)}
.deccard .dh{display:flex;align-items:center;gap:9px}
.deccard .did{font-family:var(--mono);font-size:var(--t-mono);color:var(--amber)}
.deccard .tier{margin-left:auto;font-family:var(--mono);font-size:var(--t-micro);text-transform:uppercase;letter-spacing:.08em;
  padding:2px 7px;border-radius:5px;border:1px solid var(--line)}
.deccard .tier.c{color:var(--red);border-color:oklch(0.71 0.17 24 / .4)}
.deccard .tier.a{color:var(--ink-3)}
.deccard .q{font-size:var(--t-base);color:var(--ink);font-weight:600;margin-top:8px;line-height:1.4}
.deccard .why{color:var(--ink-3);font-size:var(--t-sm);margin-top:6px;line-height:1.45}
.deccard .act{margin-top:11px;display:inline-flex;align-items:center;gap:6px;font-size:var(--t-sm);font-weight:600;
  color:var(--ink);border:1px solid var(--line);border-radius:7px;padding:6px 11px;background:var(--surface-2);transition:border-color .12s}
.deccard .act:hover{border-color:var(--accent)}
.deccard .swatch{width:8px;height:8px;border-radius:2px;flex:none}

/* ── TIMELINE ──────────────────────────────────────────────────────── */
.tl{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:14px 16px;display:flex;flex-direction:column;gap:0}
.tl .tlhead{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.tl .tabs{margin-left:auto;display:flex;gap:2px;background:var(--bg-2);border-radius:7px;padding:2px}
.tl .tabs button{padding:4px 10px;border-radius:5px;font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3)}
.tl .tabs button[aria-pressed="true"]{background:var(--surface-2);color:var(--ink)}
.ribbon{position:relative;height:38px;border-radius:7px;background:var(--bg-2);border:1px solid var(--line-soft);overflow:hidden;margin-bottom:6px}
.ribbon .hour{position:absolute;top:0;bottom:0;border-left:1px solid var(--line-soft);opacity:.5}
.ribbon .hlab{position:absolute;bottom:2px;font-family:var(--mono);font-size:8px;color:var(--ink-3);transform:translateX(3px)}
.ribbon .fire{position:absolute;top:7px;width:5px;height:5px;border-radius:50%;background:var(--accent);transform:translateX(-50%)}
.ribbon .now{position:absolute;top:0;bottom:0;width:2px;background:var(--accent);box-shadow:0 0 6px oklch(0.74 0.13 158 / .6);will-change:transform}
.tlrows{display:flex;flex-direction:column}
.tlrow{display:flex;align-items:center;gap:10px;padding:8px 4px;border-top:1px solid var(--line-soft)}
.tlrow:first-child{border-top:0}
.tlrow .lid{font-family:var(--mono);font-size:var(--t-mono);color:var(--ink-2);flex:none;width:148px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tlrow .cd{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3);margin-left:auto;flex:none}
.tlrow .nx{font-family:var(--mono);font-size:var(--t-mono);color:var(--ink);flex:none;width:78px;text-align:right}
.tlrow.prop .lid{color:var(--ink-3)}
.tlnote{font-family:var(--mono);font-size:var(--t-micro);color:var(--amber);margin-top:8px;line-height:1.5;border-top:1px solid var(--line-soft);padding-top:8px}

/* ── RELEASE RIBBON ────────────────────────────────────────────────── */
.relrib{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);padding:14px 16px;display:flex;flex-wrap:wrap;align-items:center;gap:14px}
.relrib .rid{font-family:var(--mono);font-size:var(--t-base);color:var(--ink);font-weight:600}
.relrib .stage{font-family:var(--mono);font-size:var(--t-mono);color:var(--green);padding:3px 9px;border-radius:999px;border:1px solid oklch(0.80 0.15 158 / .3);background:oklch(0.80 0.15 158 / .08)}
.relrib .lane{font-family:var(--mono);font-size:var(--t-mono);color:var(--ink-2)}
.relrib .it{font-size:var(--t-sm);color:var(--ink-3);flex:1;min-width:200px}

/* ── TABLES (the density workhorse) ────────────────────────────────── */
.tablecard{background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r);overflow:hidden}
.tablecard .th{display:flex;align-items:center;gap:10px;padding:13px 16px;border-bottom:1px solid var(--line-soft)}
.tablecard .th .tn{font-family:var(--serif);font-weight:600;font-size:var(--t-lg)}
.tablecard .th .badge2{font-family:var(--mono);font-size:var(--t-micro);padding:2px 7px;border-radius:5px;border:1px solid var(--line);color:var(--ink-3)}
.tablecard .th .own{margin-left:auto;font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3)}
.band{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--line-soft)}
.band .bs{background:var(--surface);padding:10px 12px;text-align:center}
.band .bs .n{font-family:var(--mono);font-size:1.0625rem;font-weight:700;line-height:1;color:var(--ink)}
.band .bs .l{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3);text-transform:uppercase;letter-spacing:.04em;margin-top:6px}
.band .bs.ready .n{color:var(--green)} .band .bs.gated .n{color:var(--amber)} .band .bs.held .n{color:var(--held)} .band .bs.ship .n{color:var(--green)}
.rows{display:flex;flex-direction:column}
.r{display:flex;align-items:center;gap:11px;padding:10px 16px;border-top:1px solid var(--line-soft);width:100%;text-align:left;transition:background .12s var(--ease)}
.r:hover{background:var(--surface-2)}
.r.sel{box-shadow:inset 0 0 0 1px var(--accent)}
.r .rid{font-family:var(--mono);font-size:var(--t-mono);color:var(--ink-3);flex:none;width:74px}
.r .rt{font-size:var(--t-sm);color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.r .rgate{font-family:var(--mono);font-size:var(--t-micro);color:var(--held);flex:none}
.r .tag{font-family:var(--mono);font-size:var(--t-micro);padding:1px 8px;border-radius:999px;border:1px solid var(--line);color:var(--ink-3);flex:none;text-transform:uppercase;letter-spacing:.04em}
.tag.ready{color:var(--green);border-color:oklch(0.80 0.15 158 / .3)}
.tag.gated{color:var(--amber);border-color:oklch(0.84 0.135 82 / .3)}
.tag.held{color:var(--held);border-color:oklch(0.72 0.12 300 / .35)}
.tag.ship{color:var(--green);border-color:oklch(0.80 0.15 158 / .35);background:oklch(0.80 0.15 158 / .08)}
.tag.live{color:var(--green);border-color:oklch(0.80 0.15 158 / .3)}
.tag.prop{color:var(--amber);border-color:oklch(0.84 0.135 82 / .3)}
.empty{padding:22px 16px;text-align:center;color:var(--ink-3);font-size:var(--t-sm)}
.skl{height:14px;border-radius:5px;background:linear-gradient(90deg,var(--surface-2),var(--line-soft),var(--surface-2));background-size:200% 100%;animation:shimmer 1.3s linear infinite}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* the 4-queue + connectors grids */
.queues{display:grid;gap:14px;grid-template-columns:repeat(auto-fit,minmax(330px,1fr))}

/* ── CONNECTORS view ───────────────────────────────────────────────── */
.actionbar{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:6px}
.achip{display:inline-flex;align-items:center;gap:8px;border:1px solid oklch(0.84 0.135 82 / .4);background:oklch(0.84 0.135 82 / .07);
  color:var(--amber);border-radius:9px;padding:8px 12px;text-align:left;max-width:340px;transition:background .12s var(--ease)}
.achip:hover{background:oklch(0.84 0.135 82 / .15)}
.achip .an{font-weight:600;font-size:var(--t-sm)}
.achip .ad{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-2);margin-top:2px;line-height:1.4;display:block}
.achip.red{border-color:oklch(0.71 0.17 24 / .4);background:oklch(0.71 0.17 24 / .07);color:var(--red)}
.filterbar{display:flex;gap:2px;background:var(--surface);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:2px;margin:14px 0;width:fit-content}
.filterbar button{padding:6px 13px;border-radius:6px;font-size:var(--t-sm);color:var(--ink-2);font-weight:500;display:flex;align-items:center;gap:6px;transition:background .12s var(--ease)}
.filterbar button[aria-pressed="true"]{background:var(--surface-2);color:var(--ink);box-shadow:inset 0 0 0 1px var(--line)}
.filterbar button .cn{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3)}
.csec{margin-bottom:14px}
.csec .ch{display:flex;align-items:center;gap:10px;padding:9px 4px;cursor:pointer;width:100%;text-align:left;border-bottom:1px solid var(--line-soft)}
.csec .ch .cname{font-size:var(--t-sm);font-weight:600;color:var(--ink)}
.csec .ch .cc{font-family:var(--mono);font-size:var(--t-micro);color:var(--ink-3);margin-left:auto}

/* ─────────────────────────  CRON / TIMELINE MATH  ───────────────────── */
// minimal cron next-fire: supports "m h dom mon dow" with lists/ranges/step/star.
function parseField(f,min,max){
 if(f==="*"||f==null) return null; // null = any
 const set=new Set();
 for(const part of String(f).split(",")){
  let m;
  if((m=part.match(/^\*\/(\d+)$/))){for(let i=min;i<=max;i+=+m[1])set.add(i);}
  else if((m=part.match(/^(\d+)-(\d+)$/))){for(let i=+m[1];i<=+m[2];i++)set.add(i);}
  else if(/^\d+$/.test(part))set.add(+part);
 }
 return set.size?set:null;
}
function cronParts(cad){
 // pull the leading "m h dom mon dow" if present
 const m=String(cad||"").match(/^\s*([\d*\/,\-]+)\s+([\d*\/,\-]+)\s+([\d*\/,\-]+)\s+([\d*\/,\-]+)\s+([\d*\/,\-]+)/);
 if(!m) return null;
 return {min:parseField(m[1],0,59),hr:parseField(m[2],0,23),dom:parseField(m[3],1,31),mon:parseField(m[4],1,12),dow:parseField(m[5],0,6)};
}
function nextFire(cad,from){
 const p=cronParts(cad); if(!p) return null;
 const d=new Date(from.getTime()); d.setSeconds(0,0); d.setMinutes(d.getMinutes()+1);
 for(let i=0;i<525600;i++){ // up to a year of minutes
  const okMin=!p.min||p.min.has(d.getMinutes());
  const okHr=!p.hr||p.hr.has(d.getHours());
  const okDom=!p.dom||p.dom.has(d.getDate());
  const okMon=!p.mon||p.mon.has(d.getMonth()+1);
  const okDow=!p.dow||p.dow.has(d.getDay());
  if(okMin&&okHr&&okDom&&okMon&&okDow) return new Date(d.getTime());
  d.setMinutes(d.getMinutes()+1);
 }
 return null;
}
function fmtCountdown(ms){
 if(ms==null) return "—";
 if(ms<0) return "now";
 const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60);
 if(h>=24){const dy=Math.floor(h/24);return dy+"d "+(h%24)+"h";}
 if(h>0) return h+"h "+m+"m";
 if(m>0) return m+"m";
 return s+"s";
}

function timelineHTML(loops,full){

 // ribbon: plot live loops' next fire across the next 24h (or week)
 const spanMs=tlSpan*3600*1000;
 const fires=live.map(l=>{const nf=nextFire(l.cad,now);return nf?{id:l.id,at:nf}:null;}).filter(Boolean)
   .filter(f=>f.at-now<spanMs);
 const hours=tlSpan===24?[0,4,8,12,16,20]:[];
 const ribbon=`<div class="ribbon" id="ribbon">
   ${tlSpan===24?hours.map(h=>{const pct=(h/24)*100;return `<span class="hour" style="left:${pct}%"></span><span class="hlab" style="left:${pct}%">${String(h).padStart(2,"0")}:00</span>`;}).join(""):""}
   ${fires.map(f=>{const pct=((f.at-now)/spanMs)*100;return `<span class="fire" title="${esc(f.id)} ${f.at.toLocaleTimeString()}" style="left:${pct}%"></span>`;}).join("")}
   <span class="now" id="nowmarker" style="left:0;transform:translateX(0)"></span></div>`;
 const rows=live.map(l=>{
  const nf=nextFire(l.cad,now);
  return `<div class="tlrow"><span class="dot green beat"></span><span class="lid">${esc(l.id)}</span>
    <span class="nx mono" data-cron="${esc(l.cad)}">${fmtCountdown(nf?nf-now:null)}</span>
    <span class="cd">${esc(l.cad)}</span></div>`;
 }).join("");
 const proprows=full?prop.map(l=>
   `<div class="tlrow prop"><span class="dot hollow"></span><span class="lid">${esc(l.id)}</span>
     <span class="nx mono">proposed</span><span class="cd">${esc(l.cad||'')}</span></div>`).join(""):"";
 const note=full?`<div class="tlnote">Doc-vs-reality gaps: HV deal radar stalled 2026-06-05 (not a registered cron). Crons c20375b10b15 and bc55de81f9f1 were documented but never ran.</div>`:"";
 return `<div class="tl">
   <div class="tlhead"><span class="micro">${tlSpan}h ribbon</span>
    <div class="tabs"><button data-span="24" aria-pressed="${tlSpan===24}">24h</button><button data-span="168" aria-pressed="${tlSpan===168}">week</button></div></div>
   ${ribbon}<div class="tlrows">${rows||'<div class="empty">No live loops in this scope.</div>'}${proprows}</div>${note}</div>`;
}

function openD(html){
 $("#dbody").innerHTML=html;
 const d=$("#drawer");d.classList.add("on");d.setAttribute("aria-hidden","false");$("#scrim").classList.add("on");
 // move focus into the dialog so the keyboard lands inside it (was leaking to the page behind)
 const first=$("#drawer .x")||drawerFocusable()[0];if(first)first.focus();
}
function closeD(){
 const d=$("#drawer");if(!d.classList.contains("on"))return;
 d.classList.remove("on");d.setAttribute("aria-hidden","true");$("#scrim").classList.remove("on");
 if(lastTrigger&&lastTrigger.focus)lastTrigger.focus();
}
function isDrawerOpen(){return $("#drawer").classList.contains("on");}
function kv(h,v,cls){return `<div class="kv"><span class="h">${esc(h)}</span><span class="v ${cls||''}">${v}</span></div>`;}

function openConnector(name){
 const c=(S.connectors||[]).find(x=>x.name===name);if(!c)return;
 openD(`<h2>${esc(c.name)}</h2>
  <div class="v" style="color:var(--ink-3);font-size:var(--t-sm);margin-top:3px">${esc(c.cat)}${c.stack==='lead'?' · stack lead':c.stack==='sibling'?' · sibling of '+esc(c.lead):''}</div>
  ${kv("Status",`<span class="tag ${isNeedsYou(c)?'gated':c.status==='connected'?'live':'prop'}">${esc(c.status)}</span>`)}
  ${kv("Owner agents",esc(c.owner))}
  ${kv("What it feeds",esc(c.feeds))}
  ${kv("Action needed",esc(c.action),isNeedsYou(c)?"amber":"")}
  ${kv("Note",esc(c.note))}`);
}
function openDecision(id){
 const d=computeDecisions().find(x=>x.id===id);if(!d)return;
 const hue=({ar:"var(--ar)",hv:"var(--hv)",ea:"var(--ea)",gr:"var(--gr)"})[d.company]||"var(--gr)";
 openD(`<h2>${esc(d.q)}</h2>
  <div class="v" style="margin-top:4px"><span class="tag ${d.tier==='C'?'gated':''}">Tier ${esc(d.tier)}</span> <span class="mono" style="color:var(--ink-3)">${esc(d.id)}</span></div>
  ${kv("Company",`<span class="dot" style="width:8px;height:8px;border-radius:2px;background:${hue};display:inline-block"></span> ${(SCOPES.find(s=>s.id===d.company)||{}).label||d.company}`)}
  ${kv("Context",esc(d.ctx||""))}
  ${kv("Why now",esc(d.why||""))}
  ${d.tier==="C"?`<div class="kv"><span class="h">Safety</span><span class="v amber">Level 3–5 — this is a claim, child-data, money, DNS, store, or irreversible action. Confirm explicitly.</span></div>`:""}
  ${d.connector?`<button class="gobtn" onclick="closeD();go('connectors')">Open the connector →</button>`:d.source==="release"?`<button class="gobtn" onclick="closeD();go('backlog')">Open the release ledger →</button>`:""}`);
}
function openBacklogItem(id){
 // find across queues
 let found=null,q=null;
 for(const Q of queues()){const it=Q.items.find(i=>i.id===id);if(it){found=it;q=Q;break;}}
 if(!found)return;
 openD(`<h2 style="font-size:1.25rem">${esc(found.t)}</h2>
  <div class="v" style="margin-top:4px"><span class="mono" style="color:var(--ink-3)">${esc(found.id)}</span> · <span class="tag ${found.tc||''}">${esc(found.tag)}</span></div>
  ${kv("Queue",esc(q.name)+" · "+esc(q.badge))}
  ${kv("Owner",esc(q.owner))}
  ${found.gate?kv("Gate",esc(found.gate)+" — held until the gate clears","amber"):kv("State","Ready for the orchestrator (riskClass safe).")}`);
}
function openTile(co){setScope(co);go("companies");}
function openLoop(id){
 const l=(S.loops||[]).find(x=>x.id===id);if(!l)return;
 const nf=l.status==="live"?nextFire(l.cad,new Date()):null;
 openD(`<h2 style="font-size:1.3rem">${esc(l.id)}</h2>
  <div class="v" style="margin-top:4px"><span class="tag ${l.status==='live'?'live':'prop'}">${esc(l.status)}</span> <span class="mono" style="color:var(--ink-3)">${esc(l.owner)}</span></div>
  ${kv("Cadence",esc(l.cad))}
  ${nf?kv("Next fire",esc(nf.toLocaleString())+" ("+fmtCountdown(nf-new Date())+")"):""}
  ${kv("Does",esc(l.does))}
  ${kv("Posture",esc(l.posture))}
  ${kv("Last run / truth",esc(l.last||"—"))}`);
}
function openCompany(entity){
 const c=(S.companyRegistry||[]).find(x=>x.entity===entity);if(!c)return;
 openD(`<h2 style="font-size:1.3rem">${esc(c.entity)}</h2>
  <div class="v" style="margin-top:4px;color:var(--ink-3)">${esc(c.kind)}</div>
  ${kv("Owner",esc(c.owner))}
  ${kv("Backlog(s)",esc(c.backlog))}
  ${kv("Release lane",esc(c.releaseLane))}
  ${kv("Isolation",esc(c.isolation))}
  ${kv("Status",esc(c.status))}
  ${companyHueScope(c)?`<button class="gobtn" onclick="closeD();setScope('${companyHueScope(c)}');go('companies')">Scope to ${esc(c.entity)} →</button>`:""}`);
}
function companyHueScope(c){const e=(c.entity||"").toLowerCase();if(e.includes("arbor"))return"ar";if(e.includes("holland"))return"hv";if(e.includes("ea")||e.includes("advisory"))return"ea";if(c.kind.includes("HQ"))return"gr";return null;}

/* ─────────────────────────  COMMAND PALETTE  ────────────────────────── */
let cmdItems=[],cmdSel=0;
function buildCmdIndex(){
 const idx=[];
 NAV.forEach(n=>idx.push({grp:"Views",label:n[2],sub:n[3],ic:n[1],run:()=>go(n[0])}));
 SCOPES.forEach(s=>idx.push({grp:"Companies",label:"Scope: "+s.label,sub:"scope",ic:"▣",run:()=>{setScope(s.id);go(view);}}));
 (S.connectors||[]).forEach(c=>idx.push({grp:"Connectors",label:c.name,sub:c.status,ic:"⇄",run:()=>{go("connectors");openConnector(c.name);}}));
 ((S.arbor||{}).backlog?.buildReadyTickets||[]).forEach(t=>idx.push({grp:"Backlog",label:t.id+" "+t.title,sub:"ready",ic:"▤",run:()=>{go("backlog");openBacklogItem(t.id);}}));
 computeDecisions().forEach(d=>idx.push({grp:"Decisions",label:d.q,sub:d.id,ic:"●",run:()=>{go("ops");openDecision(d.id);}}));
 // verb actions
 idx.push({grp:"Actions",label:"auth github",sub:"connector",ic:"⌁",run:()=>{go("connectors");openConnector("GitHub");}});
 idx.push({grp:"Actions",label:"set up PostHog EU (free analytics)",sub:"connector",ic:"⌁",run:()=>{go("connectors");openConnector("PostHog (EU Cloud)");}});
 idx.push({grp:"Actions",label:"set up Brevo (free lifecycle email)",sub:"connector",ic:"⌁",run:()=>{go("connectors");openConnector("Brevo + Resend");}});
 ((S.arbor||{}).backlog?.buildReadyTickets||[]).slice(0,3).forEach(t=>idx.push({grp:"Actions",label:"promote "+t.id,sub:"backlog",ic:"⌁",run:()=>{go("backlog");openBacklogItem(t.id);}}));
 return idx;
}
let cmdReturnFocus=null;
function openCmd(){cmdReturnFocus=document.activeElement;$("#cmdscrim").classList.add("on");$("#cmdinput").value="";cmdSel=0;filterCmd("");setTimeout(()=>$("#cmdinput").focus(),20);}
function closeCmd(){$("#cmdscrim").classList.remove("on");if(cmdReturnFocus&&cmdReturnFocus.focus&&document.body.contains(cmdReturnFocus))cmdReturnFocus.focus();}
function fuzzy(q,s){q=q.toLowerCase();s=s.toLowerCase();let i=0;for(const ch of s){if(ch===q[i])i++;if(i>=q.length)return true;}return q.length===0;}
function filterCmd(q){
 const all=buildCmdIndex();
 cmdItems=q?all.filter(x=>fuzzy(q,x.label)||fuzzy(q,x.sub||"")):all;
 cmdSel=Math.min(cmdSel,Math.max(0,cmdItems.length-1));
 if(!cmdItems.length){$("#cmdres").innerHTML=`<div class="cmdempty">No match — try an id (AP-007) or a verb (auth, promote).</div>`;return;}
 const grps={};cmdItems.forEach((x,i)=>{(grps[x.grp]=grps[x.grp]||[]).push({...x,i});});
 $("#cmdres").innerHTML=Object.entries(grps).map(([g,items])=>
  `<div class="cmdgrp">${esc(g)}</div>`+items.map(x=>
   `<button class="cmdit" role="option" aria-selected="${x.i===cmdSel}" data-ci="${x.i}"><span class="ci">${x.ic}</span><span class="clabel">${esc(x.label)}</span><span class="csub">${esc(x.sub||'')}</span></button>`).join("")).join("");
}
function cmdRun(i){const it=cmdItems[i];if(it){closeCmd();it.run();}}

/* ─────────────────────────  EVENTS  ─────────────────────────────────── */
document.addEventListener("click",e=>{
 // remember the opener so the drawer can restore focus on close, but never an
 // in-drawer/in-palette button (those get hidden and would strand focus)
 const btn=e.target.closest("button");
 if(btn&&!btn.closest("#drawer")&&!btn.closest(".cmd"))lastTrigger=btn;
 const nv=e.target.closest(".nv");if(nv){go(nv.dataset.v);return;}
 const sc=e.target.closest("#scopeseg button");if(sc){setScope(sc.dataset.scope);return;}
 const ps=e.target.closest(".pstage");if(ps){pipeFilter=pipeFilter===ps.dataset.pipe?null:ps.dataset.pipe;renderPipe();return;}
 const tile=e.target.closest(".tile[data-co]");if(tile){openTile(tile.dataset.co);return;}
 const dec=e.target.closest("[data-dec]");if(dec){openDecision(dec.dataset.dec);return;}
 const conn=e.target.closest("[data-conn]");if(conn){openConnector(conn.dataset.conn);return;}
 const bl=e.target.closest("[data-bl]");if(bl){openBacklogItem(bl.dataset.bl);return;}
 const lp=e.target.closest("[data-loop]");if(lp){openLoop(lp.dataset.loop);return;}
 const comp=e.target.closest("[data-comp]");if(comp){openCompany(comp.dataset.comp);return;}
 const tg=e.target.closest("[data-toggle]");if(tg){const cat=tg.dataset.toggle;connOpen[cat]=connOpen[cat]===false;renderConnectors();return;}
 const cf=e.target.closest("[data-cf]");if(cf){connFilter=cf.dataset.cf;renderConnectors();return;}
 const span=e.target.closest("[data-span]");if(span){tlSpan=+span.dataset.span;renderView();return;}
 // ── live system map (blueprint) ──
 const mfacet=e.target.closest("[data-facet]");if(mfacet){setFacet(mfacet.dataset.facet);return;}
 const mco=e.target.closest(".mnode[data-co]");if(mco){openTile(mco.dataset.co);return;}
 const mdk=e.target.closest("[data-deck]");if(mdk){go("ops");jumpDecisions();return;}
 const mgo=e.target.closest("[data-go]");if(mgo){go(mgo.dataset.go);return;}
 const ci=e.target.closest("[data-ci]");if(ci){cmdRun(+ci.dataset.ci);return;}
});
$("#cmdinput").addEventListener("input",e=>{cmdSel=0;filterCmd(e.target.value);});
$("#cmdscrim").addEventListener("click",e=>{if(e.target.id==="cmdscrim")closeCmd();});

let gKey=false,gTimer=null;
document.addEventListener("keydown",e=>{
 // cmd palette
 if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){e.preventDefault();openCmd();return;}
 if($("#cmdscrim").classList.contains("on")){
  if(e.key==="Escape"){closeCmd();return;}
  if(e.key==="ArrowDown"){e.preventDefault();cmdSel=Math.min(cmdSel+1,cmdItems.length-1);filterCmd($("#cmdinput").value);return;}
  if(e.key==="ArrowUp"){e.preventDefault();cmdSel=Math.max(cmdSel-1,0);filterCmd($("#cmdinput").value);return;}
  if(e.key==="Enter"){e.preventDefault();cmdRun(cmdSel);return;}
  return;
 }
 if(e.key==="Escape"){closeD();return;}
 // trap Tab inside the open drawer (it is aria-modal); restore happens on close
 if(isDrawerOpen()&&e.key==="Tab"){
  const f=drawerFocusable();if(!f.length)return;
  const first=f[0],last=f[f.length-1];
  if(e.shiftKey&&document.activeElement===first){e.preventDefault();last.focus();}
  else if(!e.shiftKey&&document.activeElement===last){e.preventDefault();first.focus();}
  else if(!$("#drawer").contains(document.activeElement)){e.preventDefault();first.focus();}
  return;
 }
 const tag=(e.target.tagName||"").toLowerCase();
 if(tag==="input"||tag==="textarea")return;
 if(e.key==="/"){e.preventDefault();openCmd();return;}
 // g-then-X hotkeys
 if(e.key.toLowerCase()==="g"){gKey=true;clearTimeout(gTimer);gTimer=setTimeout(()=>gKey=false,800);return;}
 if(gKey){const map={o:"ops",b:"backlog",c:"connectors",p:"companies",l:"loops",s:"standard"};const v=map[e.key.toLowerCase()];if(v){go(v);gKey=false;}return;}
 // scope arrow nav when a scope button is focused
});
$("#scopeseg").addEventListener("keydown",e=>{
 if(e.key==="ArrowRight"||e.key==="ArrowLeft"){
  const i=SCOPES.findIndex(s=>s.id===scope);const ni=(i+(e.key==="ArrowRight"?1:SCOPES.length-1))%SCOPES.length;
  setScope(SCOPES[ni].id);$$('#scopeseg button')[ni].focus();e.preventDefault();
 }
});

/* ─────────────────────────  LIVE CLOCK + NOW-MARKER  ────────────────── */
const reduceMotion=window.matchMedia("(prefers-reduced-motion:reduce)").matches;
function tick(){
 const now=new Date();
 const utc=now.toISOString().slice(11,19);
 const loc=now.toTimeString().slice(0,8);
 $("#clock").innerHTML=`<b>${loc}</b> local · ${utc} UTC`;
 // next-fire mini-readout (soonest live loop globally)
 let soonest=null;
 for(const l of (S.loops||[])){if(l.status!=="live")continue;const nf=nextFire(l.cad,now);if(nf&&(!soonest||nf<soonest.at))soonest={id:l.id,at:nf};}
 $("#nextfire").innerHTML=soonest?`next: <b>${esc(soonest.id)}</b> in ${fmtCountdown(soonest.at-now)}`:"";
 // needs-you count
 const nn=computeDecisions().length;
 $("#needsn").textContent=nn;
 $("#needsbtn").classList.toggle("zero",nn===0);
 // now-marker: the ribbon plots fires relative to "now" and re-renders each minute,
 // so the marker stays pinned to the left edge (left:0, set in markup). No per-tick work needed.
 // refresh the visible countdown cells without re-rendering everything
 $$(".nx[data-cron]").forEach(el=>{const nf=nextFire(el.dataset.cron,now);el.textContent=fmtCountdown(nf?nf-now:null);});
}
function startClock(){
 tick();
 if(reduceMotion){setInterval(tick,30000);}
 else{setInterval(tick,1000);}
 // re-plot ribbons each minute so fires + countdowns stay accurate
 setInterval(()=>{if(["ops","loops","companies","blueprint"].includes(view))renderView();},60000);
}

/* ─────────────────────────  BOOT  ───────────────────────────────────── */
function applyHash(){
 const h=(location.hash||"").replace(/^#/,"").split("/");
 if(h[1]&&SCOPES.some(s=>s.id===h[1]))scope=h[1];
 if(h[0]&&NAV.some(n=>n[0]===h[0]))view=h[0];
}
function boot(){
 applyHash();
 $$('#scopeseg button').forEach(b=>b.setAttribute("aria-pressed",b.dataset.scope===scope));
 go(view);
 renderShell();
 startClock();
}
fetch("state.json").then(r=>r.ok?r.json():null).then(j=>{
 if(j){S=Object.assign({},FB,j);if(!S.standards)S.standards=FB.standards;}
 boot();
}).catch(()=>boot());
</script>
