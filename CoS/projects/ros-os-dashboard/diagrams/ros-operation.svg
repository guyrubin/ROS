<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ROS operation: the epic-approval daily mechanism, the universal agent loop, the autonomous loops on a clock, and the safety gates.">
<title>ROS — Operation</title>
<style>
  text{font-family:'Inter',ui-sans-serif,system-ui,sans-serif}
  .title{font-family:'Frank Ruhl Libre',Georgia,serif;font-weight:700;fill:oklch(0.96 0.010 95)}
  .k{fill:oklch(0.96 0.010 95);font-weight:600}
  .r{fill:oklch(0.79 0.016 110)}
  .m{fill:oklch(0.655 0.018 120);font-family:ui-monospace,'SF Mono',monospace}
  .lab{fill:oklch(0.60 0.018 120);font-family:ui-monospace,monospace;letter-spacing:0.14em}
  .box{fill:oklch(0.225 0.012 152);stroke:oklch(0.33 0.015 152);stroke-width:1}
  .ar{fill:oklch(0.655 0.018 120);font-family:ui-monospace,monospace}
  .pill{fill:oklch(0.265 0.014 152);stroke:oklch(0.33 0.015 152);stroke-width:1}
</style>
<rect width="900" height="600" fill="oklch(0.18 0.010 152)"/>
<text class="title" x="34" y="48" font-size="26">ROS — Operation</text>
<text class="m" x="34" y="70" font-size="12">epic-approval autonomy · the universal loop · loops on a clock · safety gates</text>
<line x1="34" y1="86" x2="866" y2="86" stroke="oklch(0.295 0.013 152)" stroke-width="1"/>

<!-- daily mechanism -->
<text class="lab" x="34" y="118" font-size="10">DAILY MECHANISM</text>
<g font-size="11.5">
  <rect class="box" x="34" y="130" width="150" height="58" rx="9" stroke="oklch(0.74 0.13 158)"/>
  <text class="k" x="48" y="154" font-size="12.5">Guy approves epics</text><text class="m" x="48" y="172" font-size="10">1 batched decision</text>
  <text class="ar" x="192" y="163" font-size="14">→</text>
  <rect class="box" x="208" y="130" width="150" height="58" rx="9"/>
  <text class="k" x="222" y="154" font-size="12.5">CoS plans</text><text class="m" x="222" y="172" font-size="10">assignments · multi-agent</text>
  <text class="ar" x="366" y="163" font-size="14">→</text>
  <rect class="box" x="382" y="130" width="150" height="58" rx="9"/>
  <text class="k" x="396" y="154" font-size="12.5">Pods execute</text><text class="m" x="396" y="172" font-size="10">build to green-gate</text>
  <text class="ar" x="540" y="163" font-size="14">→</text>
  <rect class="box" x="556" y="130" width="160" height="58" rx="9"/>
  <text class="k" x="570" y="154" font-size="12.5">Release train</text><text class="m" x="570" y="172" font-size="10">branch→gate→canary→prod</text>
  <text class="ar" x="724" y="163" font-size="14">→</text>
  <rect class="box" x="740" y="130" width="126" height="58" rx="9" stroke="oklch(0.72 0.12 300)"/>
  <text class="k" x="754" y="154" font-size="12.5">Write-back</text><text class="m" x="754" y="172" font-size="10">ledger·backlog·memory</text>
</g>
<text class="m" x="34" y="208" font-size="10">Tier-A smalls (safe + reversible) run with no approval · Tier-C (claim·child-data·money·DNS·store·irreversible) always an individual yes</text>

<!-- universal loop -->
<text class="lab" x="34" y="252" font-size="10">UNIVERSAL LOOP — every agent, every domain</text>
<g font-size="11">
  <rect class="pill" x="34" y="264" width="104" height="34" rx="17"/><text class="r" x="86" y="285" text-anchor="middle">SENSE</text>
  <text class="ar" x="144" y="285">→</text>
  <rect class="pill" x="158" y="264" width="104" height="34" rx="17"/><text class="r" x="210" y="285" text-anchor="middle">FRAME</text>
  <text class="ar" x="268" y="285">→</text>
  <rect class="pill" x="282" y="264" width="104" height="34" rx="17"/><text class="r" x="334" y="285" text-anchor="middle">DESIGN</text>
  <text class="ar" x="392" y="285">→</text>
  <rect class="pill" x="406" y="264" width="110" height="34" rx="17"/><text class="r" x="461" y="285" text-anchor="middle">PRODUCE</text>
  <text class="ar" x="522" y="285">→</text>
  <rect class="pill" x="536" y="264" width="104" height="34" rx="17"/><text class="r" x="588" y="285" text-anchor="middle">VERIFY</text>
  <text class="ar" x="646" y="285">→</text>
  <rect class="pill" x="660" y="264" width="104" height="34" rx="17"/><text class="r" x="712" y="285" text-anchor="middle">DELIVER</text>
  <text class="ar" x="770" y="285">→</text>
  <rect class="pill" x="784" y="264" width="82" height="34" rx="17" stroke="oklch(0.74 0.13 158)"/><text class="r" x="825" y="285" text-anchor="middle">LEARN</text>
</g>
<text class="m" x="34" y="318" font-size="10">VERIFY = the de-slop gate + the per-domain Definition-of-Done · every loop ends in memory</text>

<!-- loops on a clock -->
<text class="lab" x="34" y="362" font-size="10">AUTONOMOUS LOOPS ON A CLOCK</text>
<g font-size="11">
  <rect class="box" x="34" y="374" width="408" height="150" rx="10"/>
  <g class="m" font-size="10.5">
    <circle cx="56" cy="400" r="3.5" fill="oklch(0.80 0.15 158)"/><text class="r" x="70" y="404" font-size="11">Arbor CIL — eval</text><text x="426" y="404" text-anchor="end">2×/day</text>
    <circle cx="56" cy="426" r="3.5" fill="oklch(0.80 0.15 158)"/><text class="r" x="70" y="430" font-size="11">Arbor CIL — build wave</text><text x="426" y="430" text-anchor="end">2×/wk</text>
    <circle cx="56" cy="452" r="3.5" fill="oklch(0.80 0.15 158)"/><text class="r" x="70" y="456" font-size="11">Product Council intake</text><text x="426" y="456" text-anchor="end">weekly</text>
    <circle cx="56" cy="478" r="3.5" fill="oklch(0.80 0.15 158)"/><text class="r" x="70" y="482" font-size="11">Marketing loop</text><text x="426" y="482" text-anchor="end">2×/wk</text>
    <circle cx="56" cy="504" r="3.5" fill="oklch(0.80 0.15 158)"/><text class="r" x="70" y="508" font-size="11">Clinical Excellence</text><text x="426" y="508" text-anchor="end">Sat</text>
  </g>
</g>

<!-- safety gates -->
<text class="lab" x="466" y="362" font-size="10">SAFETY GATES (0–5)</text>
<g font-size="10.5">
  <rect class="box" x="466" y="374" width="400" height="150" rx="10"/>
  <text class="r" x="486" y="402">L0–2  analyze · draft · write-in-workspace</text><text class="m" x="846" y="402" text-anchor="end">auto</text>
  <text class="r" x="486" y="430">L3   external action — deploy · email · post</text><text class="m" x="846" y="430" text-anchor="end" fill="oklch(0.84 0.135 82)">confirm</text>
  <text class="r" x="486" y="458">L4   financial — billing · paid spend</text><text class="m" x="846" y="458" text-anchor="end" fill="oklch(0.84 0.135 82)">+ amounts</text>
  <text class="r" x="486" y="486">L5   irreversible — delete · store · transfer</text><text class="m" x="846" y="486" text-anchor="end" fill="oklch(0.71 0.17 24)">+ warning</text>
  <text class="m" x="486" y="510" font-size="10">filesystem + Notion = the shared baton; connectors refresh, never the source of truth</text>
</g>
</svg>
