<svg viewBox="0 0 900 660" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ROS capabilities: the runtimes, the agent framework, the lean connector stack, the operating standard and method, and the knowledge layer.">
<title>ROS — Capabilities</title>
<style>
  text{font-family:'Inter',ui-sans-serif,system-ui,sans-serif}
  .title{font-family:'Frank Ruhl Libre',Georgia,serif;font-weight:700;fill:oklch(0.96 0.010 95)}
  .k{fill:oklch(0.96 0.010 95);font-weight:600}
  .r{fill:oklch(0.79 0.016 110)}
  .m{fill:oklch(0.655 0.018 120);font-family:ui-monospace,'SF Mono',monospace}
  .lab{fill:oklch(0.60 0.018 120);font-family:ui-monospace,monospace;letter-spacing:0.14em}
  .box{fill:oklch(0.225 0.012 152);stroke:oklch(0.33 0.015 152);stroke-width:1}
  .ch{font-family:'Frank Ruhl Libre',Georgia,serif;font-weight:600;fill:oklch(0.96 0.010 95)}
</style>
<rect width="900" height="660" fill="oklch(0.18 0.010 152)"/>
<text class="title" x="34" y="48" font-size="26">ROS — Capabilities</text>
<text class="m" x="34" y="70" font-size="12">runtimes · agent framework · connectors · standard &amp; method · knowledge</text>
<line x1="34" y1="86" x2="866" y2="86" stroke="oklch(0.295 0.013 152)" stroke-width="1"/>

<!-- runtimes -->
<text class="lab" x="34" y="118" font-size="10">RUNTIMES — LLM-agnostic, filesystem-shared</text>
<g font-size="11">
  <rect class="box" x="34" y="130" width="158" height="56" rx="9" stroke="oklch(0.74 0.13 158)"/><text class="k" x="50" y="155">Claude</text><text class="m" x="50" y="173" font-size="10">core builder</text>
  <rect class="box" x="200" y="130" width="158" height="56" rx="9"/><text class="k" x="216" y="155">Codex</text><text class="m" x="216" y="173" font-size="10">bulk build</text>
  <rect class="box" x="366" y="130" width="158" height="56" rx="9"/><text class="k" x="382" y="155">Gemini</text><text class="m" x="382" y="173" font-size="10">gen · multimodal</text>
  <rect class="box" x="532" y="130" width="158" height="56" rx="9"/><text class="k" x="548" y="155">Hermes</text><text class="m" x="548" y="173" font-size="10">scheduled · cron</text>
  <rect class="box" x="698" y="130" width="168" height="56" rx="9"/><text class="k" x="714" y="155">Google</text><text class="m" x="714" y="173" font-size="10">Gmail · Cal · Drive</text>
</g>

<!-- card A: framework -->
<rect class="box" x="34" y="220" width="408" height="186" rx="11"/>
<text class="ch" x="54" y="250" font-size="15">Agent framework</text>
<text class="r" x="54" y="274" font-size="11.5">Every domain runs as a mesh:</text>
<text class="m" x="54" y="294" font-size="11">lead + pods + the universal loop + a Definition-of-Done gate</text>
<text class="lab" x="54" y="324" font-size="9.5">MESHES</text>
<text class="r" x="54" y="346" font-size="11">CoS · Arbor · HollandVest · EA · KK</text>
<text class="r" x="54" y="366" font-size="11">MKT · FIN · Research · Career · Delivery</text>
<text class="m" x="54" y="392" font-size="10">on-demand by default · scheduled loops are explicit opt-in</text>

<!-- card B: connectors -->
<rect class="box" x="458" y="220" width="408" height="186" rx="11"/>
<text class="ch" x="478" y="250" font-size="15">Connectors — lean stack</text>
<text class="lab" x="478" y="276" font-size="9.5">LIVE</text>
<text class="r" x="478" y="296" font-size="11">Gmail ×3 · Notion · Drive · Calendar · Slack · Gemini · GitHub · Web</text>
<text class="lab" x="478" y="324" font-size="9.5">FREE PICKS</text>
<text class="r" x="478" y="344" font-size="11">PostHog EU · Search Console + Trends · Brevo + Resend</text>
<text class="lab" x="478" y="372" font-size="9.5">BUY ON TRIGGER</text>
<text class="m" x="478" y="392" font-size="10.5">Ahrefs · Amplitude · Linear · HubSpot — deferred, ~€0/mo now</text>

<!-- card C: standard -->
<rect class="box" x="34" y="426" width="408" height="186" rx="11"/>
<text class="ch" x="54" y="456" font-size="15">Standard &amp; method</text>
<text class="r" x="54" y="484" font-size="11.5"><tspan class="k">de-slop</tspan>  the output bar — accuracy · density · voice</text>
<text class="r" x="54" y="510" font-size="11.5"><tspan class="k">grill-me</tspan>  align before planning</text>
<text class="r" x="54" y="536" font-size="11.5"><tspan class="k">vertical-slice</tspan>  ship one real artifact, get judged</text>
<text class="r" x="54" y="562" font-size="11.5"><tspan class="k">release train</tspan>  branch → green-gate → canary → prod</text>
<text class="m" x="54" y="592" font-size="10">self-improving: Arbor CIL (product) + ROS-CIL (company)</text>

<!-- card D: knowledge -->
<rect class="box" x="458" y="426" width="408" height="186" rx="11"/>
<text class="ch" x="478" y="456" font-size="15">Knowledge</text>
<text class="r" x="478" y="484" font-size="11.5"><tspan class="k">Notion PARA</tspan>  the canonical second brain</text>
<text class="r" x="478" y="510" font-size="11.5"><tspan class="k">ROS markdown</tspan>  the durable agent knowledge base</text>
<text class="r" x="478" y="536" font-size="11.5"><tspan class="k">the cockpit</tspan>  the HTML control surface (:4700)</text>
<text class="r" x="478" y="562" font-size="11.5"><tspan class="k">memory</tspan>  every loop ends in a written entry</text>
<text class="m" x="478" y="592" font-size="10">raw ingest → AI-compiled, interlinked notes (Karpathy-style)</text>
</svg>
