<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ROS DevOps and Delivery: the release train pipeline, the DevSecOps ship-gate, claim-level gating, and the per-product release lanes.">
<title>ROS — DevOps / Delivery</title>
<style>
  text{font-family:'Inter',ui-sans-serif,system-ui,sans-serif}
  .title{font-family:'Frank Ruhl Libre',Georgia,serif;font-weight:700;fill:oklch(0.96 0.010 95)}
  .k{fill:oklch(0.96 0.010 95);font-weight:600}
  .r{fill:oklch(0.79 0.016 110)}
  .m{fill:oklch(0.655 0.018 120);font-family:ui-monospace,'SF Mono',monospace}
  .lab{fill:oklch(0.60 0.018 120);font-family:ui-monospace,monospace;letter-spacing:0.14em}
  .box{fill:oklch(0.225 0.012 152);stroke:oklch(0.33 0.015 152);stroke-width:1}
  .ar{fill:oklch(0.655 0.018 120);font-family:ui-monospace,monospace}
  .pill{fill:oklch(0.265 0.014 152);stroke:oklch(0.33 0.015 152);stroke-width:1}
</style>
<rect width="900" height="600" fill="oklch(0.18 0.010 152)"/>
<text class="title" x="34" y="48" font-size="26">ROS — DevOps / Delivery</text>
<text class="m" x="34" y="70" font-size="12">ship code safely + incrementally · the release train · lead ros-release-lead</text>
<line x1="34" y1="86" x2="866" y2="86" stroke="oklch(0.295 0.013 152)" stroke-width="1"/>

<!-- the release train pipeline -->
<text class="lab" x="34" y="118" font-size="10">THE RELEASE TRAIN — never blind-to-main, never hand-deployed</text>
<g font-size="11">
  <rect class="box" x="34" y="130" width="118" height="54" rx="9"/><text class="k" x="48" y="153" font-size="11.5">READY</text><text class="m" x="48" y="170" font-size="9.5">one backlog</text>
  <text class="ar" x="158" y="161" font-size="13">→</text>
  <rect class="box" x="174" y="130" width="118" height="54" rx="9"/><text class="k" x="188" y="153" font-size="11.5">Branch</text><text class="m" x="188" y="170" font-size="9.5">off current main</text>
  <text class="ar" x="298" y="161" font-size="13">→</text>
  <rect class="box" x="314" y="130" width="150" height="54" rx="9" stroke="oklch(0.80 0.15 158)"/><text class="k" x="328" y="153" font-size="11.5">Green-gate</text><text class="m" x="328" y="170" font-size="9.5">lint·test·framework·safety</text>
  <text class="ar" x="470" y="161" font-size="13">→</text>
  <rect class="box" x="486" y="130" width="118" height="54" rx="9"/><text class="k" x="500" y="153" font-size="11.5">Canary</text><text class="m" x="500" y="170" font-size="9.5">no-traffic + smoke</text>
  <text class="ar" x="610" y="161" font-size="13">→</text>
  <rect class="box" x="626" y="130" width="120" height="54" rx="9" stroke="oklch(0.84 0.135 82)"/><text class="k" x="640" y="153" font-size="11.5">Promote</text><text class="m" x="640" y="170" font-size="9.5" fill="oklch(0.84 0.135 82)">STOP — Guy/CoS</text>
  <text class="ar" x="752" y="161" font-size="13">→</text>
  <rect class="box" x="768" y="130" width="98" height="54" rx="9" stroke="oklch(0.74 0.13 158)"/><text class="k" x="782" y="153" font-size="11.5">Prod</text><text class="m" x="782" y="170" font-size="9.5">100%</text>
</g>
<text class="m" x="34" y="206" font-size="10">claim-bearing features ship DARK behind a flag until the claim is registered + signed · merge-lane lock serialises concurrent sessions</text>

<!-- DevSecOps ship-gate -->
<text class="lab" x="34" y="250" font-size="10">DEVSECOPS SHIP-GATE — veto on any ship</text>
<rect class="box" x="34" y="262" width="408" height="150" rx="10"/>
<text class="k" x="54" y="290" font-size="13">arbor-devsecops-lead</text><text class="m" x="54" y="307" font-size="10">composite gate · coordinates the four specialists</text>
<g font-size="11">
  <rect class="pill" x="54" y="322" width="86" height="32" rx="8"/><text class="r" x="97" y="342" text-anchor="middle">sec</text>
  <rect class="pill" x="150" y="322" width="86" height="32" rx="8"/><text class="r" x="193" y="342" text-anchor="middle">qa</text>
  <rect class="pill" x="246" y="322" width="86" height="32" rx="8"/><text class="r" x="289" y="342" text-anchor="middle">sre</text>
  <rect class="pill" x="342" y="322" width="86" height="32" rx="8"/><text class="r" x="385" y="342" text-anchor="middle">release</text>
</g>
<text class="m" x="54" y="384" font-size="10">SAST · secret scan · CVEs · coverage · perf/cost budgets</text>
<text class="m" x="54" y="400" font-size="10">+ arbor-safety / clinical veto on child-data + any claim</text>

<!-- per-product lanes -->
<text class="lab" x="466" y="250" font-size="10">RELEASE LANES — one ledger</text>
<rect class="box" x="466" y="262" width="400" height="150" rx="10"/>
<g font-size="11">
  <circle cx="488" cy="290" r="3.5" fill="oklch(0.74 0.13 158)"/><text class="r" x="502" y="294">REL-ARBOR-*</text><text class="m" x="846" y="294" text-anchor="end" font-size="10">Arbor product · weekly</text>
  <circle cx="488" cy="322" r="3.5" fill="oklch(0.74 0.13 158)"/><text class="r" x="502" y="326">REL-MKTG-*</text><text class="m" x="846" y="326" text-anchor="end" font-size="10">Arbor marketing · 2×/wk</text>
  <circle cx="488" cy="354" r="3.5" fill="oklch(0.72 0.12 300)"/><text class="r" x="502" y="358">REL-ROS-*</text><text class="m" x="846" y="358" text-anchor="end" font-size="10">ROS-the-OS · on-demand</text>
  <text class="m" x="486" y="392" font-size="10">borrows the product DevSecOps teams — no duplicate agents</text>
</g>

<!-- the rule -->
<text class="lab" x="34" y="456" font-size="10">THE STANDARD</text>
<rect class="box" x="34" y="468" width="832" height="96" rx="10"/>
<text class="r" x="54" y="498" font-size="12">A release is DONE only when: items were READY from one backlog · the FULL gate passed · the branch was current ·</text>
<text class="r" x="54" y="520" font-size="12">canary + smoke green · claim items shipped dark + registered · prod promotion signed by CoS/Guy ·</text>
<text class="r" x="54" y="542" font-size="12">the ledger + backlog (REL- id) + product memory written back.</text>
<text class="m" x="54" y="558" font-size="9.5">incremental promotion + feature/claim-level gating + regression-gated — the anti-pattern is blind 100%-to-main</text>
</svg>
